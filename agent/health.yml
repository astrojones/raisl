# Repository health — declarative checks behind `repo_health` / agent/tools/health.
# Edit freely: this file defines what "healthy" means for THIS repo.
# Kinds: lint | typecheck | test | git | diagnostics | ci | command
version: 1
checks:
  - id: lint # changed-file lint via the detected linter (ruff/eslint)
    kind: lint
  - id: typecheck # changed-file type check (mypy/pyright/tsc)
    kind: typecheck
  - id: tests # tests mapped to changed files (pytest)
    kind: test
  - id: worktree # branch, dirty flag, ahead/behind upstream, merge conflicts
    kind: git
  - id: diagnostics # LSP diagnostics for changed files (requires the Serena gateway)
    kind: diagnostics
  - id: ci # latest workflow run on the branch — NETWORK (gh); enable per repo
    kind: ci
    enabled: false
  # Custom checks: any argv-list command (never a shell string), shell-policy gated.
  # - id: compose-config
  #   kind: command
  #   command: ["docker", "compose", "config", "-q"]
  #   timeout: 60
