version: 1
limits:
  max_files_before_plan: 8
  max_lines_per_read: 240
  max_search_results: 30
  max_open_ranges_per_task: 20
preferences:
  prefer_symbol_lookup: true
  prefer_range_reads: true
  prefer_repo_tools_over_raw_shell: true
required_steps:
  before_edit:
    - relevant_files
    - impact_if_cross_file
  after_edit:
    - safe_diff
    - verify_changed
forbidden:
  - recursive_full_repo_read
  - opening_binary_files
  - reading_secrets
