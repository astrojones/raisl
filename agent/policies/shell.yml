version: 1
allow:
  - git status
  - git diff
  - git log
  - rg
  - fd
  - python
  - pytest
  - npm test
  - ./agent/tools/*
  - gh run list
  - gh run view
  - gh pr list
  - gh pr view
  - gh repo view
deny:
  - rm -rf
  - docker compose down -v
  - chmod -R 777
  - curl * | sh
  - cat .env
  - cat **/secrets/*
  - find . -type f -exec cat {} \;
require_confirmation:
  - git push
  - git reset --hard
  - git clean -fd
  - docker compose down
  - database migration
