name: raisl
description: Claude Code plugin — repo-agent-harness MCP server, agent definitions, skills, hooks, and commands.
frameworks:
  - fastmcp
  - pytest
important_paths:
  - servers/harness-mcp/        # MCP server + CLI source
  - agents/                     # agent definition markdown files
  - skills/                     # skill markdown files
  - commands/                   # slash command definitions
  - hooks/                      # pre/post tool-use hooks
  - tests/                      # test suite
  - agent/                      # bootstrapped harness tooling (self-referential)
entrypoints:
  - servers/harness-mcp/repo_agent_harness/server.py   # MCP server entry
  - servers/harness-mcp/repo_agent_harness/cli.py      # CLI entry
